kind = "web"
previewPath = "/"
title = "mpvExtended Website"
version = "1.0.0"
id = "artifacts/mpvex-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18665

[services.development]
run = "pnpm --filter @workspace/mpvex-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mpvex-web", "run", "build" ]
publicDir = "artifacts/mpvex-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18665"
BASE_PATH = "/"
